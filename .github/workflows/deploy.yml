name: Deploy MyRoutine

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build application
        run: ./gradlew clean bootJar

      - name: Find executable JAR
        id: jar
        shell: bash
        run: |
          JAR_FILE=$(find build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-plain.jar' | head -n 1)

          if [ -z "$JAR_FILE" ]; then
            echo "실행 가능한 JAR 파일을 찾지 못했습니다."
            exit 1
          fi

          echo "file=$JAR_FILE" >> "$GITHUB_OUTPUT"
          echo "배포할 파일: $JAR_FILE"

      - name: Prepare SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/github_actions
          chmod 600 ~/.ssh/github_actions

          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload JAR to EC2
        run: |
          scp \
            -i ~/.ssh/github_actions \
            "${{ steps.jar.outputs.file }}" \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ubuntu/MyRoutine/MyRoutine-new.jar"

      - name: Restart application
        run: |
          ssh -i ~/.ssh/github_actions \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" << 'EOF'
              set -e

              sudo systemctl stop myroutine

              mkdir -p /home/ubuntu/MyRoutine/build/libs

              mv /home/ubuntu/MyRoutine/MyRoutine-new.jar \
                 /home/ubuntu/MyRoutine/build/libs/MyRoutine-0.0.1-SNAPSHOT.jar

              sudo systemctl start myroutine
              sudo systemctl is-active --quiet myroutine

              echo "MyRoutine 배포 완료"
          EOF
