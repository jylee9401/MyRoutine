<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>수정</title>
</head>
<body>

<h2>루틴 수정</h2>

<form th:action="@{/edit/{id}(id=${routine.id})}" method="post">
  <input type="text" name="title" th:value="${routine.title}">
  <br>

  <input type="text" name="description" th:value="${routine.description}">
  <br>

  <input type="date" name="date" th:value="${routine.date}">
  <br>

  <button type="submit">수정 완료</button>
</form>

</body>
</html>
