<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>수정</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container nt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">

      <div class="card shadow">
        <div class="card-body">

          <h2 class="text-center mb-4">루틴 수정</h2>

          <form th:action="@{/edit/{id}(id=${routine.id})}" method="post">

            <div class="mb-3">
              <input class="form-control"
                     type="text"
                     name="title"
                     th:value="${routine.title}"
                     placeholder="루틴 제목"
                     required>
            </div>

            <div class="mb-3">
            <input class="form-control"
                    type="text"
                   name="description"
                   th:value="${routine.description}"
                  placeholder="설명">
            </div>
            <div class="mb-3">
            <input type="date" name="date" th:value="${routine.date}">
                      </div>
            <br>

            <button class="btn btn-primary w-100" type="submit">
              수정 완료
            </button>
          </form>
          <div class="text-center mt-3">
            <a href="/">메인으로 돌아가기</a>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>
</body>
</html>
