<!DOCTYPE html>
<html lang="en">
<head>
    <title>로그인</title>
</head>
<body>

    <h1>로그인</h1>

    <form action="/login" method="post">

        <input type="text"
               name="username"
               placeholder="아이디">

        <br><br>

        <input type="password"
               name="password"
               placeholder="비밀번호">

        <br><br>

        <button type="submit">
            로그인
        </button>

    </form>

    <br>

    <a href="/signup">회원가입</a>

</body>
</html>
