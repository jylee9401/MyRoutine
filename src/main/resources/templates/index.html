<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MyRoutine</title>
</head>
<body>
    <div th:if="${loginUser != null}">
        환영합니다,
        <span th:text="${loginUser.username}"></span>님
        <a href="/logout">로그아웃</a>
    </div>

    <div th:if="${loginUser ==null}">
        <a href="/login">로그인</a>
        <a href="/signup">회원가입</a>
    </div>

    <h1>MyRoutine</h1>
    <h3>전체 완료율 : <span th:text="${completionRate}"></span>%</h3>
<div th:if="${loginUser != null}">
    <p>루틴을 추가하려면 로그인하세요.</p>
    <h2>루틴 추가</h2>
    <form action="/add" method="post">
        <input type="text" name="title" placeholder="루틴 제목" required>
        <br>
        <input type="text" name="description" placeholder="설명">
        <br>
        <input type="date" name="date">
        <br>
        <button type="submit">추가</button>
    </form>
</div>
    <h2>루틴 목록</h2>

    <a href="/">전체</a>
    <a href="/?status=done">완료</a>
    <a href="/?status=undone">미완료</a>
    <a href="/?status=today">오늘</a>

    <br><br>

    <form action="/" method="get">
        <input type="text" name="keyword" placeholder="검색어 입력" >
        <button type="submit">검색</button>
    </form>

    <ul>
        <li th:each="routine : ${routines}">
            <span th:text="${routine.done ? '✅ 완료' : '⬜ 미완료'}"></span>

            <span th:style="${routine.done ? 'text-decoration: line-through;' : ''}">
                <b th:text="${routine.title}"></b>
            </span>

            <span th:text="${routine.description}"></span>
            <span th:text="${routine.date}"></span>
            <form th:action="@{/edit/{id}(id=${routine.id})}" method="get" style="display:inline;">
                <button type="submit">수정</button>
            </form>

            <form th:action="@{/toggle/{id}(id=${routine.id})}" method="post" style="display:inline;">
                <button type="submit" th:text="${routine.done ? '취소' : '완료'}"></button>
            </form>

            <form th:action="@{/delete/{id}(id=${routine.id})}" method="post" style="display:inline;">
                <button type="submit">삭제</button>
            </form>

        </li>
    </ul>
</body>
</html>
